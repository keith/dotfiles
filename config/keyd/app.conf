[alacritty]
# Let Alacritty handle these as Command shortcuts so the matching Ctrl keys
# still reach terminal programs unchanged.
mac.c = M-c
mac.x = M-x
mac.v = M-v

# Intentional Alacritty-specific behavior.
mac.t = M-t
mac.w = M-w

[google-chrome]
# Chrome/Linux equivalents for macOS browser history shortcuts.
mac.leftbrace = A-left
mac.rightbrace = A-right

# Chrome/Linux equivalents for macOS tab switching shortcuts.
shift+mac.leftbrace = C-S-tab
shift+mac.rightbrace = C-tab
