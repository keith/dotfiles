[ids]
*

[main]
capslock = esc
meta = overload(mac, macro(leftmeta))

[mac:M]
# cut/copy/paste
c = C-c
x = C-x
v = C-v

# new tab, close, new window
t = C-t
w = C-w
n = C-n
q = M-q

# select all
a = C-a
# find
f = C-f
# select url bar
l = C-l
# refresh
r = C-r
# save
s = C-s
# undo
z = C-z

# Mutli-modifier exceptions that should make it to hyprland without remapping
# There is no wildcard version we can use
[control+mac]
f = C-M-f
h = C-M-h
k = C-M-k
l = C-M-l
left = C-M-left
right = C-M-right
1 = C-M-1
2 = C-M-2
3 = C-M-3
4 = C-M-4
5 = C-M-5
6 = C-M-6
7 = C-M-7
8 = C-M-8
9 = C-M-9

[shift+mac]
3 = S-M-3
4 = S-M-4
5 = S-M-5
t = C-S-t

[control+shift+mac]
3 = C-S-M-3
4 = C-S-M-4
5 = C-S-M-5

[alt+mac]
t = A-M-t

[shift+alt+mac]
a = S-A-M-a

[control+alt+mac]
r = C-A-M-r
